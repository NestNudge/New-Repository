<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{font-family:Arial;background:#f7f9fc;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:12px;text-align:center;width:300px;}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:6px;}
button{width:100%;padding:10px;background:#2b6cb0;color:white;border:none;border-radius:6px;}
</style>
</head>

<body>
    
    <a href="/va-home-loan" class="va-banner">
  <div class="va-banner-track">
    🇺🇸 Veteran Home Loan Opportunity — No Down Payment • No PMI • Lower Rates • Check Your Eligibility Now →
    🇺🇸 Veteran Home Loan Opportunity — No Down Payment • No PMI • Lower Rates • Check Your Eligibility Now →
  </div>
</a>

<div class="box">
<h2>Partner Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<br><br>
<button onclick="signup()">Create Account</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAB8ywV2ZKISvi5i1XcqJhp85tf7JvyqYU",
  authDomain:"nestnudge-web.firebaseapp.com",
  projectId:"nestnudge-web"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* SIGNUP */
function signup(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
    .then(userCred=>{
      const uid = userCred.user.uid;

      // Save partner profile with UID
      db.collection("partners").add({
        uid: uid,
        email: email,
        timestamp: new Date()
      });

      alert("Account created!");
      window.location.href="/dashboard.html";
    })
    .catch(err=>alert(err.message));
}

/* LOGIN */
function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
    .then(()=>{
      window.location.href="/dashboard.html";
    })
    .catch(err=>alert(err.message));
}
</script>

</body>
</html>
