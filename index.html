<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NestNudge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Maps -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBpLNCvzY-QPirPIva1-UrJ4eMejo3cHdQ&libraries=places&v=beta">
  </script>
</head>

<body>

<div class="container">

  <div class="hero-text">
    <h1>Get the Best Home Service Pros — Instantly</h1>
    <p>Roofers, lenders, and agents compete for your business.</p>

    <div class="badges">
      ⭐ Trusted by homeowners  
      • ⚡ Fast matching  
      • 💰 Free to use
    </div>
  </div>

  <div class="form-card">

    <form id="leadForm">

      <label>📍 Property Address</label>
      <gmp-place-autocomplete 
        id="address"
        placeholder="Start typing your address...">
      </gmp-place-autocomplete>

      <small>We match you with top-rated local pros</small>

      <select id="projectType" required>
        <option value="">What do you need?</option>
        <option value="roof">Roofing</option>
        <option value="solar">Solar</option>
        <option value="buy">Buy a Home</option>
        <option value="sell">Sell a Home</option>
        <option value="loan">Mortgage</option>
      </select>

      <input id="name" placeholder="Full Name" required>
      <input id="email" type="email" placeholder="Email" required>
      <input id="phone" placeholder="Phone" required>

      <button type="submit">Get Matched →</button>

    </form>

  </div>

</div>

<footer>
  <p>© 2026 NestNudge — Built for homeowners</p>
</footer>

<script src="estimator.js"></script>

</body>
</html>
